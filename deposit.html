<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deposit Wallet | FameSMS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<div class="container">

<div class="header">

<div>

<h2>💰 Deposit Wallet</h2>

<p>Fund your wallet by bank transfer.</p>

</div>

<a href="dashboard.html" class="logout-btn">

← Dashboard

</a>

</div>

<div class="card">

<h3 style="margin-bottom:20px;">Bank Details</h3>

<p><strong>Bank:</strong> Your Bank Name</p>

<p><strong>Account Name:</strong> FameSMS</p>

<p><strong>Account Number:</strong> 0000000000</p>

<br>

<form id="depositForm">

<div class="form-group">

<label>Amount (₦)</label>

<input
type="number"
id="amount"
placeholder="Enter amount"
required>

</div>

<div class="form-group">

<label>Sender Name</label>

<input
type="text"
id="sender"
placeholder="Name used for transfer"
required>

</div>

<div class="form-group">

<label>Transaction Reference / Session ID</label>

<input
type="text"
id="reference"
placeholder="Enter transaction reference"
required>

</div>

<button type="submit" class="buy-btn">

✅ I Have Paid

</button>

</form>

</div>

</div>

<script type="module" src="deposit.js"></script>

</body>

</html>
