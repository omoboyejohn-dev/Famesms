<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | FameSMS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <div class="header">

        <div>

            <h2>Welcome back 👋</h2>

            <p id="username">Loading...</p>

        </div>

        <div class="header-right">

            <div class="wallet">

                💰 <span id="walletBalance">₦0.00</span>

            </div>

            <button class="logout-btn" id="logoutBtn">

                Logout

            </button>

        </div>

    </div>



    <!-- Dashboard Cards -->

    <div class="cards">

        <a href="usa-numbers.html" class="card">

            <h3>🇺🇸 USA Numbers</h3>

        </a>

        <a href="countries.html" class="card">

            <h3>🌍 All Countries</h3>

        </a>

        <a href="deposit.html" class="card">

            <h3>➕ Deposit Wallet</h3>

        </a>

        <a href="transactions.html" class="card">

            <h3>📜 Transaction History</h3>

        </a>

        <a href="orders.html" class="card">

            <h3>📦 My Orders</h3>

        </a>

        <a href="accounts.html" class="card">

            <h3>🛒 Buy Account</h3>

        </a>

    </div>



    <!-- Recent Activations -->

    <div class="recent">

        <div class="recent-header">

            <h3>Recent Activations</h3>

            <button id="refreshBtn">🔄 Refresh</button>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>

                        <th>Service</th>

                        <th>Number</th>

                        <th>SMS Code</th>

                        <th>Price</th>

                        <th>Status</th>

                        <th>Date</th>

                    </tr>

                </thead>

                <tbody id="activationTable">

                    <tr>

                        <td colspan="6" style="text-align:center;">

                            No activations yet

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>



<!-- Bottom Navigation -->

<div class="bottom-nav">

    <a href="deposit.html">💰 Deposit</a>

    <a href="dashboard.html">🏠 Home</a>

    <a href="#" id="bottomLogout">🚪 Logout</a>

</div>


<script type="module" src="dashboard.js"></script>

</body>

</html>
