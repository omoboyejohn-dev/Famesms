<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | FameSMS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:'Poppins',sans-serif;

    background:#050816;

    color:white;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

}



.register-box{

    width:100%;

    max-width:450px;

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,.1);

    border-radius:20px;

    padding:35px;

    backdrop-filter:blur(15px);

}



.logo{

    text-align:center;

    font-size:32px;

    font-weight:700;

    color:#00d4ff;

    margin-bottom:10px;

}



.register-box h1{

    text-align:center;

    margin-bottom:10px;

}



.register-box p{

    text-align:center;

    color:#b8c0d4;

    margin-bottom:30px;

}



.form-group{

    margin-bottom:18px;

}



.form-group label{

    display:block;

    margin-bottom:8px;

    font-weight:500;

}



.form-group input{


    width:100%;

    padding:14px;

    border:none;

    outline:none;

    border-radius:10px;

    background:#111827;

    color:white;

    font-size:15px;

}



.create-btn{


    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:linear-gradient(135deg,#4f46e5,#00d4ff);

    color:white;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

}



.create-btn:hover{

    opacity:.9;

}



.login-link{

    text-align:center;

    margin-top:25px;

    color:#b8c0d4;

}



.login-link a{

    color:#00d4ff;

    text-decoration:none;

    font-weight:600;

}



</style>


</head>


<body>


<div class="register-box">


<div class="logo">

⚡ FameSMS

</div>


<h1>Create Account</h1>


<p>
Create your FameSMS account quickly.
</p>



<form id="registerForm">



<div class="form-group">

<label>Full Name</label>

<input 
type="text"
id="fullname"
placeholder="Enter your full name"
required>

</div>




<div class="form-group">

<label>Gmail Address</label>

<input 
type="email"
id="email"
placeholder="Enter your Gmail address"
required>

</div>





<div class="form-group">

<label>Password</label>

<input 
type="password"
id="password"
placeholder="Create password"
required>

</div>





<div class="form-group">

<label>Confirm Password</label>

<input 
type="password"
id="confirmPassword"
placeholder="Confirm password"
required>

</div>





<button 
type="submit"
class="create-btn">

Create Account

</button>




<div class="login-link">

Already have an account?

<a href="login.html">
Login
</a>


</div>



</form>



</div>



<script src="register.js"></script>


</body>

</html>
