<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | FameSMS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#050816;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
color:#fff;
}

.box{
width:100%;
max-width:450px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:40px;
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#b8c0d4;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:10px;
background:#111827;
color:#fff;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#4f46e5,#00d4ff);
color:#fff;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.95;
}

a{
display:block;
margin-top:20px;
text-align:center;
color:#00d4ff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h1>Forgot Password</h1>

<p>Enter your email address and we'll send you a password reset link.</p>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

<button id="resetBtn">

Send Reset Link

</button>

<a href="login.html">

← Back to Login

</a>

</div>

<script type="module" src="forgot-password.js"></script>

</body>

</html>
