<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | FameSMS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{

font-family:Poppins,sans-serif;
background:#050816;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;

}

.box{

width:100%;
max-width:420px;
background:#111827;
padding:35px;
border-radius:18px;

}

h2{

text-align:center;
margin-bottom:10px;

}

p{

text-align:center;
color:#b8c0d4;
margin-bottom:25px;

}

input{

width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#1f2937;
color:#fff;
margin-bottom:20px;

}

button{

width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

a{

display:block;
text-align:center;
margin-top:20px;
color:#00d4ff;

}

</style>

</head>

<body>

<div class="box">

<h2>Forgot Password</h2>

<p>Enter your email address to receive a password reset link.</p>

<input
type="email"
id="email"
placeholder="Enter your email">

<button id="resetBtn">

Send Reset Link

</button>

<a href="login.html">

Back to Login

</a>

</div>

<script type="module" src="forgot-password.js"></script>

</body>

</html>
